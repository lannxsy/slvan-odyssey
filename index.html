<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sylvan Odyssey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=400;700;900&family=Lato:wght=300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1a0f;}
#game-menu{
  width:100%;height:100vh;
  background:#0a1a0f;
  position:relative;overflow:hidden;
  font-family:'Lato',sans-serif;
}
.sky{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,#050d08 0%,#0e2616 40%,#1a3d24 70%,#0d2010 100%);
}
.stars{position:absolute;inset:0;}
.star{
  position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:var(--min);}to{opacity:var(--max);}}
.vignette{
  position:absolute;inset:0;
  background:radial-gradient(circle,transparent 30%,rgba(3,8,5,0.8) 100%);
  pointer-events:none;
}
.container{
  position:relative;z-index:10;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:20px;
}
.title-area{text-align:center;margin-bottom:60px;animation:fadeIn 2s ease-out;}
.main-title{
  font-family:'Cinzel',serif;font-size:4.5rem;font-weight:900;
  color:#e4f5e8;text-transform:uppercase;letter-spacing:12px;
  text-shadow:0 0 20px rgba(93,214,104,0.4),0 0 40px rgba(5,13,8,0.8);
  margin-bottom:10px;
}
.subtitle{
  font-family:'Cinzel',serif;font-size:1.2rem;font-weight:400;
  color:#86b390;letter-spacing:6px;text-transform:uppercase;
}
.menu-actions{
  display:flex;flex-direction:column;gap:18px;
  min-width:280px;animation:slideUp 1.5s ease-out;
}
.btn{
  background:linear-gradient(135deg,rgba(22,54,31,0.6) 0%,rgba(13,34,19,0.8) 100%);
  border:1px solid #336e43;border-radius:4px;
  color:#cce3d2;padding:15px 30px;
  font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1);
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(93,214,104,0.15),transparent);
  transition:all 0.6s;
}
.btn:hover::before{left:100%;}
.btn:hover{
  color:#fff;border-color:#5dd668;
  box-shadow:0 0 25px rgba(93,214,104,0.3),inset 0 0 10px rgba(93,214,104,0.2);
  transform:translateY(-2px);
}
.btn-primary{
  background:linear-gradient(135deg,rgba(37,92,51,0.8) 0%,rgba(16,43,23,0.9) 100%);
  border-color:#4a9e5e;color:#fff;
}
.btn-primary:hover{border-color:#7de888;box-shadow:0 0 35px rgba(125,232,136,0.4);}
.footer-text{
  position:absolute;bottom:25px;left:50%;transform:translateX(-50%);
  color:#45694e;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;
  white-space:nowrap;text-align:center;
}
.fireflies,.leaves{position:absolute;inset:0;pointer-events:none;}
.firefly{
  position:absolute;width:4px;height:4px;background:#9effa9;border-radius:50%;
  filter:blur(1px);box-shadow:0 0 8px #5dd668;
  animation:fly var(--dur) linear infinite;
}
@keyframes fly{0%{transform:translate(0,0) scale(0.8);opacity:0;}15%{opacity:0.6;}85%{opacity:0.6;}100%{transform:translate(var(--x1),var(--y1)) translate(var(--x2),var(--y2)) translate(var(--x3),var(--y3)) scale(1.2);opacity:0;}}
.leaf{
  position:absolute;border-radius:0 15px;transform:rotate(45deg);
  animation:fall var(--fall) linear infinite,drift var(--fall) ease-in-out infinite alternate;
}
@keyframes fall{0%{top:-20px;opacity:0;}10%{opacity:0.7;}90%{opacity:0.7;}100%{top:105vh;opacity:0;}}
@keyframes drift{from{transform:translateX(0) rotate(45deg);}to{transform:translateX(var(--drift)) rotate(225deg);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="game-menu">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="fireflies" id="fireflies"></div>
  <div class="vignette"></div>
  <div class="container">
    <div class="title-area">
      <h1 class="main-title">Sylvan Odyssey</h1>
      <div class="subtitle">The Rising Canopy</div>
    </div>
    <div class="menu-actions">
      <button class="btn btn-primary" id="btn-start" onclick="this.textContent='Loading...'; this.disabled=true; window.external.invoke('openLevelSelect');">Start Journey</button>
      <button class="btn" id="btn-options">Options</button>
      <button class="btn" id="btn-exit" onclick="window.external.invoke('exit');">Exit</button>
    </div>
    <div class="footer-text">STMIK AMIK Bandung &copy; 2026</div>
  </div>
</div>
<script>
  const menu=document.getElementById('game-menu');
  const sts=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=1+Math.random()*2;
    s.style.cssText=`top:${Math.random()*100}%;left:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${2+Math.random()*3}s;--min:${0.1+Math.random()*0.3};--max:${0.6+Math.random()*0.4};`;
    sts.appendChild(s);
  }
  const ff=document.getElementById('fireflies');
  for(let i=0;i<15;i++){
    const f=document.createElement('div');
    f.className='firefly';
    f.style.cssText=`top:${20+Math.random()*60}%;left:${10+Math.random()*80}%;--dur:${6+Math.random()*6}s;--x1:${-50+Math.random()*100}px;--y1:${-35+Math.random()*70}px;--x2:${-50+Math.random()*100}px;--y2:${-35+Math.random()*70}px;--x3:${-50+Math.random()*100}px;--y3:${-35+Math.random()*70}px;animation-delay:${Math.random()*8}s;`;
    ff.appendChild(f);
  }
  const leafColors=['#3eb84a','#5dd668','#2fa338','#7de888','#2d8a34','#4db055','#68d870'];
  for(let i=0;i<22;i++){
    const leaf=document.createElement('div');
    leaf.className='leaf';
    const sz=6+Math.random()*6;
    leaf.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;--fall:${5+Math.random()*7}s;--drift:${-80+Math.random()*160}px;animation-delay:${Math.random()*10}s;background:${leafColors[Math.floor(Math.random()*leafColors.length)]};`;
    menu.appendChild(leaf);
  }
</script>
</body>
</html>
